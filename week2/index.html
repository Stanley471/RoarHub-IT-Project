<!DOCTYPE html>
<html lang="en">
<head>

<body>

     <div class="white-center-card">

        <!-- Row 2 -->

            <img src="sad-face.jpg" alt="sad face">

        <!-- Row 3-->
         <div class="details-section-row row3">
            <img src="happy-face.jpg" alt="happy face">

     </div>
     </div>

     <button>Go back</button>
